<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Ujian SDN Mujahidin 05</title>
    <style>
        /* CSS tetap sama seperti sebelumnya */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-page { display: flex; flex-direction: column; align-items: center; width: 320px; padding: 40px 20px; border: 3px solid #4CAF50; border-radius: 40px; background-color: #fff; text-align: center; }
        .logo { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; margin: 0; font-weight: bold; }
        h2 { font-size: 1.1rem; margin: 5px 0 30px 0; font-weight: normal; color: #555; }
        .input-group { margin-bottom: 15px; width: 100%; }
        input { width: 85%; padding: 12px 15px; border: 3px solid #42a5f5; border-radius: 25px; outline: none; }
        .btn-login { width: 70%; padding: 12px; background-color: #00bcd4; color: white; border: none; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #exam-page { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; padding: 10px; }
        .header-container { width: 100%; background-color: white; border: 4px solid #4CAF50; border-radius: 35px; padding: 15px; box-sizing: border-box; text-align: center; margin-bottom: 15px; }
        .user-info-box { border: 3px solid #42a5f5; border-radius: 25px; padding: 10px; margin-bottom: 10px; }
        .title-bar { background-color: #007bff; color: white; padding: 5px 0; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .timer-box { background-color: #c8e6c9; border: 3px solid #42a5f5; border-radius: 25px; padding: 8px; font-size: 22px; font-weight: bold; }
        .form-container { width: 100%; height: 70vh; background-color: white; border: 4px solid #42a5f5; border-radius: 35px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="login-page">
        <img src="Logo.png" alt="Logo" class="logo">
        <h1>Ujian Nasional Mujahidin</h1>
        <h2>SDN Mujahidin 05 Malang</h2>
        <div class="input-group"><input type="text" id="username" placeholder="Username"></div>
        <div class="input-group"><input type="text" id="nama" placeholder="Nama Siswa"></div>
        <div class="input-group"><input type="text" id="nism" placeholder="Nomor Induk Mujahidin"></div>
        <button class="btn-login" onclick="startExam()">LOGIN</button>
    </div>

    <div id="exam-page">
        <div class="header-container">
            <div class="user-info-box">
                <h3 id="displayInfo">(Nama) - (User)</h3>
                <p id="displayNISM">NISM: (Nomor Induk)</p>
            </div>
            <div class="title-bar">UJIAN NASIONAL MUJAHIDIN</div>
            <div class="timer-box">Sisa Waktu : <span id="timer">1.00.00</span></div>
        </div>
        <div class="form-container">
            <iframe src="https://forms.gle/s4J6DsHLv4YfEkxNA">Memuat...</iframe>
        </div>
    </div>

    <script>
        let isExamActive = false;
        let timerInterval;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

               // Fungsi untuk membuat suara Sirine (Naik-Turun)
        function playSiren() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'triangle'; // Suara lebih tajam dibanding 'sine'
            
            const now = audioCtx.currentTime;
            
            // Membuat efek naik turun frekuensi (Sirine)
            oscillator.frequency.setValueAtTime(400, now);
            oscillator.frequency.linearRampToValueAtTime(1000, now + 0.5);
            oscillator.frequency.linearRampToValueAtTime(400, now + 1.0);
            oscillator.frequency.linearRampToValueAtTime(1000, now + 1.5);
            oscillator.frequency.linearRampToValueAtTime(400, now + 2.0);

            // Mengatur volume agar tidak pecah
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 2.5);

            oscillator.start();
            oscillator.stop(now + 2.5);
        }

        // Update pada bagian deteksi keluar halaman
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden' && isExamActive) {
                playSiren(); // Memanggil suara sirine
                forceLogout();
            }
        });


        function startExam() {
            const user = document.getElementById('username').value;
            const nama = document.getElementById('nama').value;
            const nism = document.getElementById('nism').value;

            if(user === "" || nama === "" || nism === "") {
                alert("Mohon isi semua data!");
                return;
            }

            // Resume audio context setelah interaksi user (kebijakan browser)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            document.getElementById('displayInfo').innerText = `${nama} - ${user}`;
            document.getElementById('displayNISM').innerText = `NISM : ${nism}`;
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('exam-page').style.display = 'flex';

            isExamActive = true;
            startTimer(3600); 
        }

        // DETEKSI KELUAR HALAMAN
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden' && isExamActive) {
                playBeep(); // Bunyikan suara beep
                forceLogout();
            }
        });

        function forceLogout() {
            isExamActive = false;
            clearInterval(timerInterval);
            
            alert("PERINGATAN: Terdeteksi keluar dari halaman ujian! Anda harus login kembali.");
            
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('exam-page').style.display = 'none';
            
            // Reset input
            document.getElementById('username').value = "";
            document.getElementById('nama').value = "";
            document.getElementById('nism').value = "";
        }

        function startTimer(duration) {
            let timer = duration, hours, minutes, seconds;
            timerInterval = setInterval(function () {
                hours = parseInt(timer / 3600, 10);
                minutes = parseInt((timer % 3600) / 60, 10);
                seconds = parseInt(timer % 60, 10);

                document.getElementById('timer').textContent = hours + "." + 
                    (minutes < 10 ? "0" + minutes : minutes) + "." + 
                    (seconds < 10 ? "0" + seconds : seconds);

                if (--timer < 0) {
                    clearInterval(timerInterval);
                    alert("Waktu habis!");
                }
            }, 1000);
        }
    </script>
</body>
</html>
